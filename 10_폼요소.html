<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼요소</title>
</head>
<body>
    <h2>fieldset / legend</h2>
    <p>폼 요소를 그룹으로 묶어주는 태그들</p>
    <p>fieldset으로 하나의 그룹으로 묶어서 외곽선을 그려주고, legned로 그 묶음의 제목을 적어준다.</p>
    <p>심미성이 떨어져서 잘 쓰지 않는다.</p>
    <br><br>
    <fieldset>
        <legend>필수요소</legend>
        <label for="id">아이디</label>
        <input type="text" id="id" required><br>
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" required><br>
    </fieldset>
    <fieldset>
        <legend>선택요소</legend>
        <label for="name">이름</label>
        <input type="text" id="name"><br>
        성별
        남<input type="radio" name="sex" checked>
        여<input type="radio" name="sex">
    </fieldset>
</body>
</html>
